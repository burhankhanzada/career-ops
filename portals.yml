search_queries:
  # -- AI & Python Specialized --
  - name: ai-jobs.net — AI & ML Roles
    query: 'site:ai-jobs.net "AI Engineer" OR "Machine Learning" OR "Python" remote'
    enabled: true
  - name: Python.org — Python Jobs
    query: 'site:python.org/jobs "Remote" OR "Europe"'
    enabled: true
  - name: YC Jobs — AI Startups
    query: 'site:workatastartup.com "AI" OR "LLM" OR "Python" remote'
    enabled: true

  # -- Existing Portals --
  - name: RustJobs.dev - Rust Europe 
    query: "site:rustjobs.dev \"Rust\" Germany OR remote" 
    enabled: true
  - name: LinkedIn - Werkstudent Mobile/Full Stack
    query: 'site:linkedin.com/jobs "Werkstudent" OR "Working Student" "Flutter" OR "Android" OR "Full Stack" Germany'
    enabled: true
  - name: StepStone - Werkstudent IT
    query: 'site:stepstone.de "Werkstudent" "Software" OR "App" OR "Web" OR "Android"'
    enabled: true
  - name: Ashby - Working Student Germany
    query: 'site:jobs.ashbyhq.com "Working Student" OR "Werkstudent" "Engineer" OR "Developer" Germany'
    enabled: true
  - name: Greenhouse - Working Student Germany
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Working Student" OR "Werkstudent" "Engineer" Germany'
    enabled: true
  - name: Workable - Intern / Working Student
    query: 'site:apply.workable.com "Working Student" OR "Intern" "Developer" Germany'
    enabled: true
  - name: RemoteOK - Junior & Intern
    query: 'site:remoteok.com "Junior" OR "Intern" "Mobile" OR "Full Stack"'
    enabled: true
  - name: Manfred - Junior Tech Europe
    query: 'site:getmanfred.com/en/job-offers "Junior" OR "Intern" "Flutter" OR "Android" OR "Full Stack"'
    enabled: true

tracked_companies:
  # -- AI Labs & Specialized --
  - name: OpenAI
    careers_url: https://openai.com/careers
    scan_method: websearch
    scan_query: 'site:openai.com/careers "Engineer" OR "Research"'
    enabled: true
  - name: Anthropic
    careers_url: https://job-boards.greenhouse.io/anthropic
    api: https://boards-api.greenhouse.io/v1/boards/anthropic/jobs
    enabled: true
  - name: Mistral AI
    careers_url: https://jobs.lever.co/mistral
    notes: "Paris. European AI lab."
    enabled: true
  - name: Hugging Face
    careers_url: https://apply.workable.com/huggingface/
    scan_method: websearch
    scan_query: 'site:apply.workable.com/huggingface'
    notes: "Paris / NYC / Remote. ML hub."
    enabled: true
  - name: DeepL
    careers_url: https://jobs.ashbyhq.com/DeepL
    notes: "Cologne DE. Translation & language AI."
    enabled: true
  - name: Aleph Alpha
    careers_url: https://jobs.ashbyhq.com/AlephAlpha
    notes: "Heidelberg DE. Sovereign European LLM provider."
    enabled: true

